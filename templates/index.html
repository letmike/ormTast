<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    {% load static %}
    <link href="{% static 'bootstrap-3.4.1-dist/css/bootstrap.min.css'%}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header-nav {
            background: linear-gradient(135deg, #555, #777);
            padding: 18px 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 50px;
        }
        .nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            color: #fff;
            text-decoration: none;
        }
        .jumbotron {
            background: linear-gradient(to right, #f5f5f5, #eee);
            padding: 50px 0;
            text-align: center;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .footer {
            text-align: center;
            margin-top: 80px;
            padding: 30px 0;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="header-nav">
    <div class="nav-container">
        <a href="{% url 'index' %}" class="nav-item">首页</a>
        <a href="{% url 'register' %}" class="nav-item">注册</a>
        <a href="{% url 'login' %}" class="nav-item">登录</a>
        <a href="{% url 'contact' %}" class="nav-item">联系我们</a>
    </div>
</div>

<div class="container">
    <div class="jumbotron">
        <h1>欢迎来到用户中心</h1>
        <p>当前共有 {{ count }} 位注册用户</p>
    </div>

    <div class="card">
        <h3 class="text-center">用户列表</h3>
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                </tr>
            </thead>
            <tbody>
                {% for user in user_list %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ user.username }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">暂无用户</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="footer">
    © 2026 用户中心 版权所有
</div>

<script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
<script src="{% static 'bootstrap-3.4.1-dist/js/bootstrap.min.js' %}"></script>
</body>
</html>
