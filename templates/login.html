<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    {% load static %}
    <link href="{% static 'bootstrap-3.4.1-dist/css/bootstrap.min.css'%}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header-nav {
            background: linear-gradient(135deg, #555, #777);
            padding: 18px 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 50px;
        }
        .nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            color: #fff;
            text-decoration: none;
        }
        .page-title {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 32px;
            font-weight: bold;
            color: #444;
        }
        .panel {
            border-radius: 15px !important;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: none;
        }
        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .panel-primary {
            border-color: #666 !important;
        }
        .panel-primary .panel-heading {
            background: linear-gradient(135deg, #555, #777) !important;
            border-color: #666 !important;
            padding: 20px 0;
        }
        .panel-title {
            font-size: 22px !important;
            font-weight: bold !important;
            color: white;
        }
        .form-control {
            height: 46px;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-primary {
            height: 48px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            background: #666 !important;
            border-color: #666 !important;
        }
        .btn-primary:hover {
            background: #555 !important;
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            margin-top: 80px;
            padding: 30px 0;
            color: #999;
            border-top: 1px solid #eee;
        }
        .alert-danger {
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="header-nav">
    <div class="nav-container">
        <a href="{% url 'index' %}" class="nav-item">首页</a>
        <a href="{% url 'register' %}" class="nav-item">注册</a>
        <a href="{% url 'login' %}" class="nav-item">登录</a>
        <a href="{% url 'contact' %}" class="nav-item">联系我们</a>
    </div>
</div>

<h2 class="page-title">欢迎登录</h2>

<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <div class="panel panel-primary">
                <div class="panel-heading text-center">
                    <h3 class="panel-title">用户登录</h3>
                </div>
                <div class="panel-body">
                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" class="form-control" name="username" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">立即登录</button>
                    </form>
                </div>
                <div class="panel-footer text-center">
                    还没有账号？<a href="{% url 'register' %}">立即注册</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 用户中心 版权所有
</div>

<script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
<script src="{% static 'bootstrap-3.4.1-dist/js/bootstrap.min.js' %}"></script>
</body>
</html>
